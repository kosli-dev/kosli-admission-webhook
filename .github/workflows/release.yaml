name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  # id-token: write   # TODO(supply-chain): needed for cosign keyless signing

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          # TODO(supply-chain, see TODO.md): add linux/arm64 once tested
          platforms: linux/amd64
          tags: ghcr.io/${{ github.repository }}:${{ github.ref_name }}
      # TODO(supply-chain, see TODO.md):
      #   - cosign keyless sign the image
      #   - generate + attach SBOM (syft)
      #   - attest the artifact in a Kosli flow (dogfooding: this webhook
      #     should be able to admit itself)

  github-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # goreleaser needs full history + tags to compute the changelog
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: '.go-version'
          check-latest: true
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  chart:
    runs-on: ubuntu-latest
    needs: image
    steps:
      - uses: actions/checkout@v7
      - uses: azure/setup-helm@v5
      - run: helm package charts/kosli-admission-webhook -d dist/
      - run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
          helm push dist/*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
      # TODO(supply-chain): pin the image by digest in released chart values,
      # sign the chart, publish provenance.
