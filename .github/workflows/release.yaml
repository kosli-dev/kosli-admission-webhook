name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  # id-token: write   # TODO(supply-chain): needed for cosign keyless signing

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          # TODO(supply-chain, see TODO.md): add linux/arm64 once tested
          platforms: linux/amd64
          tags: ghcr.io/${{ github.repository }}:${{ github.ref_name }}
      # TODO(supply-chain, see TODO.md):
      #   - cosign keyless sign the image
      #   - generate + attach SBOM (syft)
      #   - attest the artifact in a Kosli flow (dogfooding: this webhook
      #     should be able to admit itself)

  chart:
    runs-on: ubuntu-latest
    needs: image
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm package charts/kosli-admission-webhook -d dist/
      - run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
          helm push dist/*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
      # TODO(supply-chain): pin the image by digest in released chart values,
      # sign the chart, publish provenance.
