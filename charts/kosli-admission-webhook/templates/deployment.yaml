{{- include "kosli-webhook.validateScope" . -}}
{{- include "kosli-webhook.validateCertProvider" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kosli-webhook.fullname" . }}
  labels: {{- include "kosli-webhook.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: {{- include "kosli-webhook.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "kosli-webhook.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ .Values.kosli | toYaml | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "kosli-webhook.serviceAccountName" . }}
      # the webhook never talks to the Kubernetes API
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- if .Values.hostNetwork }}
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if and .Values.priorityClassName (not .Values.platform.gkeAutopilot) }}
      priorityClassName: {{ .Values.priorityClassName }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: webhook
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext: {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: https
              containerPort: {{ .Values.service.targetPort }}
          env:
            - name: LISTEN_ADDR
              value: ":{{ .Values.service.targetPort }}"
            - name: KOSLI_HOST
              value: {{ .Values.kosli.host | quote }}
            - name: KOSLI_ORG
              value: {{ required "kosli.org is required" .Values.kosli.org | quote }}
            {{- if .Values.kosli.environment }}
            - name: KOSLI_ENVIRONMENT
              value: {{ .Values.kosli.environment | quote }}
            {{- end }}
            {{- if .Values.kosli.policyNames }}
            - name: KOSLI_POLICY_NAMES
              value: {{ join "," .Values.kosli.policyNames | quote }}
            {{- end }}
            - name: REQUIRE_DIGEST_PINNING
              value: {{ .Values.webhook.requireDigestPinning | quote }}
            {{- if .Values.webhook.registryCredentialsSecret }}
            - name: DOCKER_CONFIG
              value: /docker-config
            {{- end }}
            - name: DENY_UNKNOWN_ARTIFACTS
              value: {{ .Values.webhook.denyUnknownArtifacts | quote }}
            - name: CACHE_TTL
              value: {{ .Values.webhook.cacheTTL | quote }}
            - name: SHUTDOWN_DELAY
              value: {{ .Values.webhook.shutdownDelay | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.logging.level | quote }}
            - name: LOG_FORMAT
              value: {{ .Values.logging.format | quote }}
            {{- if .Values.proxy.httpsProxy }}
            - name: HTTPS_PROXY
              value: {{ .Values.proxy.httpsProxy | quote }}
            {{- end }}
            {{- if .Values.proxy.httpProxy }}
            - name: HTTP_PROXY
              value: {{ .Values.proxy.httpProxy | quote }}
            {{- end }}
            {{- if .Values.proxy.noProxy }}
            - name: NO_PROXY
              value: {{ .Values.proxy.noProxy | quote }}
            {{- end }}
            - name: KOSLI_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "kosli-webhook.tokenSecretName" . }}
                  key: {{ .Values.kosli.existingSecretKey }}
          volumeMounts:
            - name: tls
              mountPath: /certs
              readOnly: true
            {{- if .Values.webhook.registryCredentialsSecret }}
            - name: registry-credentials
              mountPath: /docker-config
              readOnly: true
            {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 5
          resources: {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: tls
          secret:
            secretName: {{ include "kosli-webhook.tlsSecretName" . }}
            {{- if eq .Values.certificates.provider "openshift-service-ca" }}
            items:
              - key: tls.crt
                path: tls.crt
              - key: tls.key
                path: tls.key
            {{- end }}
        {{- if .Values.webhook.registryCredentialsSecret }}
        # the keychain expects $DOCKER_CONFIG/config.json; dockerconfigjson
        # Secrets store the payload under the .dockerconfigjson key
        - name: registry-credentials
          secret:
            secretName: {{ .Values.webhook.registryCredentialsSecret }}
            items:
              - key: .dockerconfigjson
                path: config.json
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints: {{- toYaml . | nindent 8 }}
      {{- end }}
